<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CineSearch - Modern movie and TV show search app with watchlist, video playback, and animated space background."
    />
    <meta
      name="keywords"
      content="Movie Search, TV Shows, Watchlist, Video Playback, OMDb API"
    />
    <meta name="author" content="Emmanuel Wole" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1e1e2e" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CineSearch - Movie & TV Show Search" />
    <meta
      property="og:description"
      content="Discover and watch movies and TV shows with an amazing animated space background."
    />
    <meta
      property="og:image"
      content="https://emmanuelwole.github.io/movie-search/images/preview.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="CineSearch - Movie & TV Show Search"
    />
    <meta
      property="twitter:description"
      content="Discover and watch movies and TV shows with an amazing animated space background."
    />

    <title>CineSearch - Movie & TV Show Search</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles.css" as="style" />
    <link rel="preload" href="app.js" as="script" />

    <!-- Optimized Font Awesome loading -->
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      />
    </noscript>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Space Background -->
    <canvas id="spaceCanvas"></canvas>

    <div class="container">
      <header class="hero-header">
        <h1>🎬 CineSearch</h1>
        <p>Discover movies and shows</p>
      </header>

      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search movies or shows..."
          aria-label="Search movies or shows"
        />
        <div class="filter-group">
          <select
            id="filterType"
            class="filter-select"
            aria-label="Filter by type"
          >
            <option value="">All</option>
            <option value="movie">Movies</option>
            <option value="series">TV Shows</option>
          </select>
          <button id="searchBtn" class="search-btn" aria-label="Search">
            <i class="fas fa-search"></i> Search
          </button>
        </div>
      </div>

      <div
        id="errorMessage"
        class="error-message"
        role="alert"
        aria-live="polite"
      ></div>
      <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>

      <div class="results-section">
        <div id="resultsContainer" class="results-grid"></div>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <i class="fas fa-search"></i>
        <p>Search for a movie or show to get started</p>
      </div>

      <div id="paginationContainer" class="pagination"></div>

      <!-- Modal -->
      <div
        id="detailsModal"
        class="modal hidden"
        role="dialog"
        aria-labelledby="modalTitle"
      >
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
          <button
            class="modal-close"
            onclick="closeModal()"
            aria-label="Close modal"
          >
            <i class="fas fa-times"></i>
          </button>
          <div id="modalBody" class="modal-body"></div>
        </div>
      </div>

      <div id="watchlistPanel" class="watchlist-panel">
        <div class="watchlist-header">
          <h3>📋 Watchlist</h3>
          <div class="watchlist-buttons">
            <button
              id="closeWatchlist"
              class="toggle-btn"
              aria-label="Close watchlist"
              title="Close watchlist"
            >
              <i class="fas fa-times"></i>
            </button>
            <button
              id="toggleWatchlist"
              class="toggle-btn"
              aria-label="Toggle watchlist"
              title="Hide watchlist"
            >
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
        <div id="watchlistItems" class="watchlist-items"></div>
        <button
          id="clearWatchlist"
          class="clear-watchlist-btn"
          aria-label="Clear watchlist"
        >
          Clear All
        </button>
      </div>

      <button
        id="watchlistToggleFloat"
        class="watchlist-toggle-float"
        title="Show Watchlist"
      >
        <i class="fas fa-bookmark"></i>
        <span id="watchlistCount" class="watchlist-count-badge">0</span>
      </button>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
